<div class="row">
    <div class="col s12 m7 offset-m1 xl6 offset-xl1 offset-right-m1">
        <div id="form_container" class="big-section">
            <div id="engine" class="scrollspy">
                <h3 class="header">Engine</h3>
                <div class="section">
                    <label>
                        <span id="engine-label-tooltiped" class="hidden tooltipped" data-position="right"
                              data-tooltip="Mephisto communicates with a chess engine running locally on your machine
                                            to evaluate positions. NOTE: remote-engine.py (in &quot;src/scripts&quot;)
                                            must be running and configured properly for this to work.">
                            Engine <i class="material-icons info-tooltip">info</i>
                        </span>
                        <span id="engine-label-untooltiped">
                            Engine
                        </span>
                        <select name="engine" id="engine_select">
                            <option value="stockfish-dev-nnue">Stockfish dev 2026-07 NNUE - 90MB</option>
                            <option value="stockfish-18-nnue">Stockfish 18 NNUE - 112MB</option>
                            <option value="stockfish-18-small-nnue">Stockfish 18 Small NNUE - 15MB</option>
                            <option value="stockfish-11-hce">Stockfish 11 HCE</option>
                            <option value="fairy-stockfish-14-nnue">Fairy Stockfish 14 NNUE</option>
                            <option value="sf-native">Stockfish — native, full power ⚡ (setup required)</option>
                            <option value="fairy-native">Fairy-Stockfish — native, full power ⚡ (setup required)</option>
                            <option value="remote">Remote Engine</option>
                        </select>
                    </label>
                </div>
                <div class="section" id="elo_section">
                    <label>
                        <span class="tooltipped" data-position="right"
                              data-tooltip="Cap the engine's playing strength to a target Elo (sent as
                                            UCI_LimitStrength + UCI_Elo). The valid range follows the engine
                                            (SF dev/18: 1320-3190, SF 11: 1350-2850, Fairy: 500-2850), and
                                            out-of-range values are ignored (not clamped). 0 = full strength (no cap).">
                            Elo <i class="material-icons info-tooltip">info</i>
                        </span>
                        <input id="elo_input" type="number" min="0" max="3190" step="10">
                    </label>
                </div>
                <div class="section">
                    <label>
                        Variant
                        <select name="variant" id="variant_select">
                            <option value="chess">Chess</option>
                            <option value="fischerandom">Chess960</option>
                            <option value="crazyhouse">Crazyhouse</option>
                            <option value="kingofthehill">King of the Hill</option>
                            <option value="3check">Three-Check</option>
                            <option value="antichess">Antichess</option>
                            <option value="atomic">Atomic</option>
                            <option value="horde">Horde</option>
                            <option value="racingkings">Racing Kings</option>
                        </select>
                    </label>
                </div>
                <div class="flex-group">
                    <div class="section">
                        <label>
                            Search Time (ms)
                            <input id="compute_time_input" type="number">
                        </label>
                    </div>
                    <div class="section">
                        <label>
                            <span class="tooltipped" data-position="right"
                                  data-tooltip="Position changes are detected instantly (event-driven). This is only
                                                a slow safety-net poll that heals a missed update; 1000ms is fine."
                            >
                                Fallback Poll Interval (ms) <i class="material-icons info-tooltip">info</i>
                            </span>
                            <input id="fen_refresh_input" type="number">
                        </label>
                    </div>
                </div>
                <div class="section">
                    <label>
                        Multiple Lines (<span class="value"></span>)
                        <p class="range-field">
                            <input id="multiple_lines_range" type="range" min="1" max="5" step="1">
                        </p>
                    </label>
                </div>
                <div class="section">
                    <label>
                        Threads (<span class="value"></span>)
                        <p class="range-field">
                            <input id="threads_range" type="range" min="1" max="32" step="1">
                        </p>
                    </label>
                </div>
                <div class="section">
                    <label>
                        Memory (<span class="value"></span> MB)
                        <p class="range-field">
                            <input id="memory_range" type="range" min="32" max="512" step="32">
                        </p>
                    </label>
                </div>
                <div class="flex-group">
                    <div class="section switch">
                        <label class="switch-label">Show Computer Evaluation</label>
                        <label>
                            Off
                            <input id="computer_evaluation_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label">Show Threat Analysis</label>
                        <label>
                            Off
                            <input id="threat_analysis_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label tooltipped" data-position="right"
                               data-tooltip="Mephisto plays as the &quot;Brain&quot;, choosing which piece type to
                                             move, and you play as the &quot;Hand&quot;, selecting the specific legal
                                             move for that piece."
                        >
                            "Hand & Brain" Mode <i class="material-icons info-tooltip">info</i>
                        </label>
                        <label>
                            Off
                            <input id="simon_says_mode_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                </div>
            </div>
            <div id="autoplay" class="scrollspy">
                <h3 class="header">Autoplay</h3>
                <div class="flex-group">
                    <div class="section switch">
                        <label class="switch-label">Autoplay</label>
                        <label>
                            Off
                            <input id="autoplay_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label tooltipped" data-position="right"
                               data-tooltip="While the opponent thinks, certify a reply to their predicted move.
                                             If they play exactly that move, answer instantly; anything else searches
                                             normally. Never fires in a wrong position. Needs Autoplay."
                        >
                            Premove <i class="material-icons info-tooltip">info</i>
                        </label>
                        <label>
                            Off
                            <input id="premove_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label tooltipped" data-position="right"
                               data-tooltip="Instead of autoplaying, all analysis arrows are drawn directly on the
                                             site's board while the engine keeps evaluating -- play the move yourself
                                             when ready. Overrides Autoplay while on."
                        >
                            Help Mode <i class="material-icons info-tooltip">info</i>
                        </label>
                        <label>
                            Off
                            <input id="help_mode_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label tooltipped" data-position="right"
                               data-tooltip="Play like a human: instant recaptures and forced moves, quick obvious
                                             moves, long thinks in critical positions -- and occasionally a second-best
                                             move, a mistake, or (rarely) a blunder.
                                             Priority -- Time: Mirror &gt; Clock &gt; Humanize &gt; Search Time (first one
                                             enabled sets the duration; recaptures &amp; forced moves always instant).
                                             Move: Humanize &gt; engine best."
                        >
                            Humanize <i class="material-icons info-tooltip">info</i>
                        </label>
                        <label>
                            Off
                            <input id="humanize_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label tooltipped" data-position="right"
                               data-tooltip="Read the game clock off the page and budget thinking + search to it:
                                             roughly time/30 plus 60% of the increment per move, near-instant when
                                             short on time.
                                             Priority -- Time: Mirror &gt; Clock &gt; Humanize &gt; Search Time (first one
                                             enabled sets the duration; recaptures &amp; forced moves always instant).
                                             Move: Humanize &gt; engine best."
                        >
                            Clock Mode <i class="material-icons info-tooltip">info</i>
                        </label>
                        <label>
                            Off
                            <input id="clock_mode_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                        <label class="switch-label tooltipped" data-position="right"
                               data-tooltip="Pace to the opponent instead: spend what they spent on their last
                                             move, minus 10%, staying just ahead on the clock (30% extra haste
                                             when behind). Falls back to the Clock Mode budget when their spend
                                             is unknown. Recaptures and forced moves stay instant.
                                             Priority -- Time: Mirror &gt; Clock &gt; Humanize &gt; Search Time (first one
                                             enabled sets the duration; recaptures &amp; forced moves always instant).
                                             Move: Humanize &gt; engine best."
                        >
                            Mirror Time <i class="material-icons info-tooltip">info</i>
                        </label>
                        <label>
                            Off
                            <input id="mirror_mode_checkbox" type="checkbox">
                            <span class="lever"></span>
                            On
                        </label>
                    </div>
                    <div class="section switch">
                    <label class="switch-label tooltipped" data-position="right"
                           data-tooltip="Mephisto optimizes for solving chess puzzles as quickly as possible, at the
                                         expense of accuracy. This should be enabled when autoplaying puzzle minigames,
                                         like Chess.com's Puzzle Rush and Lichess's Puzzle Storm."
                    >
                        Puzzle Mode <i class="material-icons info-tooltip">info</i>
                    </label>
                    <label>
                        Off
                        <input id="puzzle_mode_checkbox" type="checkbox">
                        <span class="lever"></span>
                        On
                    </label>
                </div>
                    <div class="section switch">
                            <label class="switch-label tooltipped" data-position="right"
                                   data-tooltip="Mephisto takes control of the mouse pointer to perform automated moves.
                                                 NOTE: mephisto-clicker.py (in &quot;src/scripts&quot;) must be running
                                                 for this to work. You may need to grant specific permissions for
                                                 PyAutoGUI depending on your setup (do a google search for this)."
                            >
                                Python Backend <i class="material-icons info-tooltip">info</i>
                            </label>
                            <label>
                                Off
                                <input id="python_autoplay_backend_checkbox" type="checkbox">
                                <span class="lever"></span>
                                On
                            </label>
                        </div>
                </div>
                <div class="section" id="humanize-mix">
                    <span class="switch-label tooltipped" data-position="right"
                          data-tooltip="Humanize move mix: how often each choice is played. Make the five values
                                        add up to 100 -- the Total row shows what to add or remove. Second/third lines
                                        are skipped when more than 0.6 pawns worse (the best move is played instead);
                                        mistakes are 0.6-1.5 pawns worse, blunders 1.5-4.5 (never in decided games,
                                        never into mate). Changes apply to the very next move, no reload needed."
                    >
                        Humanize Move Mix (%) <i class="material-icons info-tooltip">info</i>
                    </span>
                    <div class="mix-row">
                        <span class="mix-label">Top move</span>
                        <p class="range-field"><input id="humanize_top_mixrange" type="range" min="0" max="100" step="1"></p>
                        <input id="humanize_top_mixnum" type="number" min="0" max="100" step="1">
                    </div>
                    <div class="mix-row">
                        <span class="mix-label">Second line</span>
                        <p class="range-field"><input id="humanize_second_mixrange" type="range" min="0" max="100" step="1"></p>
                        <input id="humanize_second_mixnum" type="number" min="0" max="100" step="1">
                    </div>
                    <div class="mix-row">
                        <span class="mix-label">Third line</span>
                        <p class="range-field"><input id="humanize_third_mixrange" type="range" min="0" max="100" step="1"></p>
                        <input id="humanize_third_mixnum" type="number" min="0" max="100" step="1">
                    </div>
                    <div class="mix-row">
                        <span class="mix-label">Mistakes</span>
                        <p class="range-field"><input id="humanize_mistake_mixrange" type="range" min="0" max="100" step="1"></p>
                        <input id="humanize_mistake_mixnum" type="number" min="0" max="100" step="1">
                    </div>
                    <div class="mix-row">
                        <span class="mix-label">Blunders</span>
                        <p class="range-field"><input id="humanize_blunder_mixrange" type="range" min="0" max="100" step="1"></p>
                        <input id="humanize_blunder_mixnum" type="number" min="0" max="100" step="1">
                    </div>
                    <div class="mix-row mix-total-row">
                        <span class="mix-label">Total</span>
                        <span id="humanize_mix_total"></span>
                    </div>
                </div>
                <div class="flex-group">
                    <div class="section">
                        <label>
                            <span class="switch-label tooltipped" data-position="right"
                                data-tooltip="Mephisto will always wait at least this long after fully evaluating a
                                              position (determined by Search Time) to make a move."
                            >
                                Simulated Think Time (ms) <i class="material-icons info-tooltip">info</i>
                            </span>
                            <input id="think_time_input" type="number">
                        </label>
                    </div>
                    <div class="section">
                        <label>
                            <span class="switch-label tooltipped" data-position="right"
                                data-tooltip="Mephisto will wait a random extra amount of time, up to this amount, on
                                              top of Simulated Think Time."
                            >
                                Simulated Think Time Variance (ms) <i class="material-icons info-tooltip">info</i>
                            </span>
                            <input id="think_variance_input" type="number">
                        </label>
                    </div>
                </div>
                <div class="flex-group">
                    <div class="section">
                        <label>
                            <span class="switch-label tooltipped" data-position="right"
                                  data-tooltip="Mephisto will always take at least this long to perform the mouse
                                                actions of a single move."
                            >
                                Simulated Move Time (ms) <i class="material-icons info-tooltip">info</i>
                            </span>
                            <input id="move_time_input" type="number">
                        </label>
                    </div>
                    <div class="section">
                        <label>
                            <span class="switch-label tooltipped" data-position="right"
                                  data-tooltip="Mephisto will take a random extra amount of time, up to this amount,
                                                on top of Simulated Move Time."
                            >
                                Simulated Move Time Variance (ms) <i class="material-icons info-tooltip">info</i>
                            </span>
                            <input id="move_variance_input" type="number">
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="big-section">
            <div class="flex-group flex-small-gap">
                <button id="reset_btn" class="waves-effect waves-light btn">Restore Defaults</button>
            </div>
        </div>
    </div>
    <div class="col hide-on-small-only m3 xl3 offset-xl1 sticky-top">
        <div class="toc-wrapper pin-top">
            <ul id="toc" class="section table-of-contents">
                <li>
                    <a href="#engine">Engine</a>
                </li>
                <li>
                    <a href="#autoplay">Autoplay</a>
                </li>
            </ul>
        </div>
    </div>
</div>
